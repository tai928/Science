<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="中学化学シミュレーション">
  <title>理科シミュレーション</title>
  <link rel="stylesheet" href="style.css">
  <script src="site.js" defer></script>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="ホーム">
      <span class="brand-mark" aria-hidden="true">理</span>
      <span>理科シミュレーション</span>
    </a>
    <div class="menu-area">
      <button class="menu-button" type="button" aria-expanded="false" aria-controls="global-nav" aria-label="メニューを開く">
        <span class="sr-only">メニュー</span>
        <span class="line" aria-hidden="true"></span>
        <span class="line" aria-hidden="true"></span>
        <span class="line" aria-hidden="true"></span>
      </button>
      <nav id="global-nav" class="global-nav" aria-label="メインナビゲーション">
        <a aria-current="page" href="index.html">ホーム</a>
        <a href="chemistry.html">中学化学</a>
      </nav>
    </div>
  </header>

  <main class="home-page">
    <section class="hero">
      <h1>中学化学を、動かして学ぶ。</h1>
      <div class="hero-actions">
        <a class="button button-primary" href="chemistry.html#grade-1">はじめる</a>
      </div>
    </section>

    <section class="section" aria-labelledby="grades-title">
      <div class="section-heading">
        <h2 id="grades-title">学年から選ぶ</h2>
      </div>
      <div class="material-grid">
        <article class="material-card">
          <div class="card-content">
            <p class="card-tag">中学1年</p>
            <h3>物質の性質と状態変化</h3>
            <ul class="card-points"><li>密度</li><li>気体</li><li>溶解度</li><li>粒子運動</li></ul>
            <a class="text-link" href="chemistry.html#grade-1">開く <span aria-hidden="true">→</span></a>
          </div>
        </article>
        <article class="material-card">
          <div class="card-content">
            <p class="card-tag">中学2年</p>
            <h3>化学変化と質量</h3>
            <ul class="card-points"><li>質量保存</li><li>酸化と還元</li></ul>
            <a class="text-link" href="chemistry.html#grade-2">開く <span aria-hidden="true">→</span></a>
          </div>
        </article>
        <article class="material-card">
          <div class="card-content">
            <p class="card-tag">中学3年</p>
            <h3>イオンと化学反応</h3>
            <ul class="card-points"><li>沈殿</li><li>電気分解</li><li>化学電池</li><li>中和</li></ul>
            <a class="text-link" href="chemistry.html#grade-3">開く <span aria-hidden="true">→</span></a>
          </div>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
