<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="中学1年から3年までの化学シミュレーション">
  <title>中学化学 | 理科シミュレーション</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="chemistry.css">
  <script src="site.js" defer></script>
  <script src="chemistry.js" defer></script>
  <script src="textbook-content.js" defer></script>
  <script src="chemistry-route.js" defer></script>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="ホーム">
      <span class="brand-mark" aria-hidden="true">理</span>
      <span>理科シミュレーション</span>
    </a>
    <div class="menu-area">
      <button class="menu-button" type="button" aria-expanded="false" aria-controls="global-nav" aria-label="メニューを開く">
        <span class="sr-only">メニュー</span>
        <span class="line" aria-hidden="true"></span>
        <span class="line" aria-hidden="true"></span>
        <span class="line" aria-hidden="true"></span>
      </button>
      <nav id="global-nav" class="global-nav" aria-label="メインナビゲーション">
        <a href="index.html">ホーム</a>
        <a aria-current="page" href="chemistry.html">中学化学</a>
        <a href="index.html#about">About</a>
      </nav>
    </div>
  </header>

  <main class="chemistry-page">
    <div class="page-heading">
      <h1>中学化学</h1>
      <p>学年と単元を選択</p>
    </div>

    <div class="chemistry-layout">
      <aside class="curriculum-nav" aria-label="単元選択">
        <div class="grade-tabs" id="grade-tabs"></div>
        <div class="unit-list" id="unit-list"></div>
      </aside>

      <div class="content-column">
        <section class="simulation-area" aria-live="polite">
          <header class="simulation-header">
            <div>
              <p id="topic-grade"></p>
              <h2 id="topic-title"></h2>
              <p id="topic-description"></p>
            </div>
            <button id="reset-topic" class="reset-button" type="button">リセット</button>
          </header>
          <div id="simulation-content"></div>
        </section>

        <section class="textbook-section" aria-labelledby="textbook-title">
          <div class="textbook-heading">
            <div>
              <p class="textbook-label">TEXTBOOK</p>
              <h2 id="textbook-title">教科書による解説</h2>
            </div>
            <span id="textbook-topic-name"></span>
          </div>
          <div class="textbook-content" id="textbook-content"></div>
        </section>
      </div>
    </div>
  </main>
</body>
</html>
